name: Code Review and Quality Check

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  code-quality:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'eclipse-temurin'
          cache: maven

      - name: 🔍 Build and run tests
        run: mvn clean verify -DskipITs

      - name: 📊 SonarQube Scan (Optional - configure SonarQube token)
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_LOGIN: ${{ secrets.SONAR_LOGIN }}
        run: |
          if [ -n "$SONAR_HOST_URL" ] && [ -n "$SONAR_LOGIN" ]; then
            mvn sonar:sonar \
              -Dsonar.projectKey=springboot-starter-kit \
              -Dsonar.host.url=$SONAR_HOST_URL \
              -Dsonar.login=$SONAR_LOGIN
          else
            echo "⚠️  SonarQube configuration not found, skipping scan"
          fi

      - name: 📈 Generate test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Report
          path: 'target/surefire-reports/*.xml'
          reporter: 'java-junit'
          fail-on-error: true

      - name: 💬 Comment PR with Build Status
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## Build Status Report\n\n';
            
            if (context.payload.pull_request) {
              const buildStatus = job.status === 'success' ? '✅ SUCCESS' : '❌ FAILED';
              comment += `- Build: ${buildStatus}\n`;
              comment += `- Java: 21\n`;
              comment += `- Tests: Running on commit ${{ github.sha }}\n`;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

  code-format:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'eclipse-temurin'

      - name: 🎨 Check code formatting with Checkstyle
        run: |
          mvn checkstyle:check || true

  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'eclipse-temurin'
          cache: maven

      - name: 🔐 Check dependencies for vulnerabilities
        run: mvn org.owasp:dependency-check-maven:check || true

      - name: 🏷️ Dependency audit
        run: mvn dependency:tree

